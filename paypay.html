<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPay Gold Monitor</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: #000000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #ffffff;
        }
        .card { background: #111111; padding: 35px; border-radius: 16px; border: 1px solid #333; text-align: center; width: 300px; }
        .label { font-size: 11px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
        .total-value { font-family: monospace; font-size: 32px; font-weight: bold; margin: 15px 0; }
        .profit-box { background: #000000; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; }
        .profit-value { font-family: monospace; font-size: 24px; font-weight: bold; color: #666; }
        .percent-value { font-family: monospace; font-size: 14px; color: #666; margin-top: 8px; }
        .btn { background: #ff0033; color: #ffffff; border: none; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; }
        .info { font-family: monospace; font-size: 9px; color: #444; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">Total Points</div>
        <div id="total" class="total-value">44,195 pt</div>
        <div class="profit-box">
            <div style="font-size: 10px; color:#666; margin-bottom: 5px;">NET PROFIT</div>
            <div id="profit" class="profit-value">±0 pt</div>
            <div id="percent" class="percent-value">0.00 %</div>
        </div>
        <button class="btn" onclick="updatePrice()">UPDATE DATA</button>
        <div class="info">
            NOW_GOLD: <span id="market-price">--</span>円/g<br>
            START_POINT: 44,195 pt<br>
            LAST_UPDATE: <span id="last-update">--:--:--</span>
        </div>
    </div>

    <script>
        // あなたの現在のポイント
        const myPoint = 44195;
        // 基準となる「今の金価格」を保持する変数
        let baseGoldPrice = null;

        async function updatePrice() {
            const btn = document.querySelector('.btn');
            btn.innerText = "FETCHING...";
            
            try {
                // 金の価格(USD)を取得
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
                const data = await response.json();
                const currentUsd = parseFloat(data.price);
                
                // 為替を掛けて円建てg単価を算出 (158.98は現在の目安)
                const currentJpyGram = (currentUsd * 158.98) / 31.1035;

                // 【修正の核心】
                // 初回実行時、今の価格をそのまま「基準（0%地点）」として設定する
                if (baseGoldPrice === null) {
                    baseGoldPrice = currentJpyGram;
                }

                // 基準価格からの変化率を計算
                const changeRatio = currentJpyGram / baseGoldPrice;
                const total = Math.round(myPoint * changeRatio);
                const profit = total - myPoint;
                const percent = ((changeRatio - 1) * 100).toFixed(2);

                // 表示更新
                document.getElementById('total').innerText = total.toLocaleString() + " pt";
                document.getElementById('profit').innerText = (profit >= 0 ? "+" : "") + profit.toLocaleString() + " pt";
                document.getElementById('percent').innerText = (profit >= 0 ? "▲ " : "▼ ") + percent + " %";
                
                // 色制御
                const color = profit > 0 ? "#00ff66" : (profit < 0 ? "#ff0033" : "#666");
                document.getElementById('profit').style.color = color;
                document.getElementById('percent').style.color = color;

                document.getElementById('market-price').innerText = Math.round(currentJpyGram).toLocaleString();
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerText = "UPDATE DATA";
            }
        }
        updatePrice();
    </script>
</body>
</html>
